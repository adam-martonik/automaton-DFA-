name: DFA Simulator CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Automaton.sln

      - name: Build
        run: dotnet build src/Automaton.sln --no-restore --configuration Release

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Automaton.sln

      - name: Run tests
        run: dotnet test tests/Automaton.Tests/Automaton.Tests.csproj
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  publish:
    name: 📦 Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Automaton.sln

      - name: Publish
        run: dotnet publish src/Automaton.CLI/Automaton.CLI.csproj
          --configuration Release
          --output publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: automaton-dfa-${{ github.sha }}
          path: publish/